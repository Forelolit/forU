<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForU</title>
</head>

<body style="background-color: #f1f1f1; margin: 0; padding: 0; box-sizing: border-box;">
    <main class=""
        style="display: flex; gap: 20px; flex-direction: column; justify-content: center; align-items: center;">
        <h1 style="font-family: sans-serif, Arial, Helvetica;">С 8 марта! Аяна</h1>

        <div class="meme" style="overflow: hidden; width: 300px; height: 200px; border-radius: 20px;">
            <img src="meme.jpg" alt="meme"
                style="object-fit: cover; object-position: center; width: 100%; height: 100%;">
        </div>

        <div class="heart"
            style="position: relative; height: 275px; width: 100%; max-width: 370px; display: flex; justify-content: center;">
            <div class="cirle"
                style="position: absolute; top: 0; left: 0; width: 200px; height: 200px; background-color: #ff5656; border-radius: 50%;">
            </div>
            <div class="cirle"
                style="position: absolute; top: 0; right: 0; width: 200px; height: 200px; background-color: #ff5656; border-radius: 50%;">
            </div>
            <div class="triangle"
                style="position: absolute; rotate: 135deg; bottom: 0; width: 200px; height: 200px; background-color: #ff5656; border-radius: 30px;">
            </div>
        </div>
    </main>
</body>

</html>
